<!DOCTYPE html>

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .card { max-width: 450px; margin: auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        
        .header { background: #b9212d; color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; font-size: 26px; letter-spacing: 3px; font-weight: bold; }
        .header p { margin: 5px 0 0; font-size: 13px; letter-spacing: 1px; }

        /* Botones */
        .btn { display: block; padding: 16px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 15px; margin-bottom: 12px; transition: 0.2s; }
        .btn-red { background: #b9212d; color: white; }
        .btn-dark { background: #333; color: white; }
        .btn:active { transform: scale(0.98); }

        .footer { background: #333; color: white; padding: 20px; text-align: center; }
        .firma-img { width: 100%; max-width: 350px; height: auto; margin-bottom: 10px; border-radius: 0; }
        .footer p { margin: 0; font-size: 13px; opacity: 0.8; }
    </style>
</head>
